<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropAcademy - Learn</title>
  <script src="vendor/tailwind.cdn.js"></script>
  <script defer src="vendor/alpine.min.js"></script>

  <link rel="stylesheet" href="vendor/codemirror.min.css">
  <link rel="stylesheet" href="vendor/dracula.min.css">
  <script src="vendor/codemirror.min.js"></script>
  <script src="vendor/cm-python.min.js"></script>
  <script src="vendor/cm-htmlmixed.min.js"></script>
  <script src="vendor/cm-xml.min.js"></script>
  <script src="vendor/cm-javascript.min.js"></script>
  <script src="vendor/cm-css.min.js"></script>

  <script src="vendor/marked.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    html, body { height: 100%; margin: 0; overflow: hidden; }

    .CodeMirror {
      height: 100%;
      font-size: 14px;
      font-family: 'Fira Code', 'Consolas', monospace;
      line-height: 1.6;
    }

    
    .prose h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; margin-bottom: 0.75rem; }
    .prose h2 { font-size: 1.15rem; font-weight: 600; color: #e2e8f0; margin: 1.25rem 0 0.5rem; }
    .prose h3 { font-size: 1rem; font-weight: 600; color: #cbd5e1; margin: 1rem 0 0.4rem; }
    .prose p { color: #94a3b8; line-height: 1.7; margin-bottom: 0.75rem; }
    .prose ul { list-style: disc; padding-left: 1.25rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .prose li { margin-bottom: 0.3rem; line-height: 1.6; }
    .prose code { background: #1e293b; color: #7dd3fc; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.875em; font-family: 'Fira Code', monospace; }
    .prose pre { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 1rem; overflow-x: auto; margin-bottom: 0.75rem; }
    .prose pre code { background: none; color: #e2e8f0; padding: 0; font-size: 0.85em; }
    .prose strong { color: #e2e8f0; }
    .prose a { color: #60a5fa; text-decoration: underline; }
    .prose blockquote { border-left: 3px solid #3b82f6; padding-left: 1rem; color: #64748b; margin: 0.75rem 0; }
    .prose table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.85em; }
    .prose th { background: #1e293b; color: #e2e8f0; padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #334155; }
    .prose td { color: #94a3b8; padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
    .prose tr:last-child td { border-bottom: none; }

    
    .light-prose h1 { color: #111827; }
    .light-prose h2 { color: #1f2937; }
    .light-prose h3 { color: #374151; }
    .light-prose p { color: #374151; }
    .light-prose ul { color: #374151; }
    .light-prose li { color: #374151; }
    .light-prose code { background: #f1f5f9; color: #0369a1; }
    .light-prose pre { background: #f8fafc; border-color: #e2e8f0; }
    .light-prose pre code { color: #1e293b; }
    .light-prose strong { color: #111827; }
    .light-prose a { color: #2563eb; }
    .light-prose blockquote { color: #6b7280; }
    .light-prose table th { background: #f1f5f9; color: #1e293b; border-bottom-color: #cbd5e1; }
    .light-prose table td { color: #374151; border-bottom-color: #e2e8f0; }

    @keyframes flash-green { 0%,100% { background: transparent; } 50% { background: rgba(34,197,94,0.15); } }
    .flash-success { animation: flash-green 0.6s ease; }
    @keyframes flash-red { 0%,100% { background: transparent; } 50% { background: rgba(239,68,68,0.1); } }
    .flash-error { animation: flash-red 0.6s ease; }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans flex flex-col" style="height:100vh;">

  <div x-data="learnApp()" x-init="init()" x-cloak class="flex flex-col" style="height:100vh;">

    
    <header class="flex items-center gap-4 px-4 py-2 border-b border-gray-800 bg-gray-950 shrink-0" style="height:52px;">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <img src="logo.png" alt="DropAcademy" style="height:26px;object-fit:contain" />
      </a>
      <div class="w-px h-4 bg-gray-700"></div>
      <span class="text-sm font-medium text-white" x-text="course?.title || '...'"></span>

      <div class="flex-1 mx-4">
        <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
          <div class="h-full bg-blue-500 rounded-full transition-all duration-300" :style="`width: ${progress}%`"></div>
        </div>
      </div>

      <span class="text-sm text-gray-400" x-text="course ? `${stepIndex + 1} / ${course.steps.length}` : ''"></span>

      
      <button
        @click="toggleLight()"
        class="ml-2 w-8 h-8 flex items-center justify-center rounded-lg text-lg transition-colors"
        :class="lightMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-800 hover:bg-gray-700'"
        :title="lightMode ? 'Switch to dark mode' : 'Switch to light mode'"
        x-text="lightMode ? '🌙' : '☀️'"
      ></button>
    </header>

    
    <div class="flex flex-1 overflow-hidden">

      
      <div
        class="flex flex-col shrink-0 overflow-hidden border-r transition-all duration-200"
        :class="lightMode ? 'border-gray-200 bg-gray-50' : 'border-gray-800 bg-gray-950'"
        :style="pathOpen ? 'width:220px' : 'width:0px'"
      >
        <div class="overflow-y-auto flex-1 py-3 w-[220px]">
          <template x-for="group in courseGroups" :key="group.label">
            <div class="mb-3">
              <div
                class="px-4 py-1 text-xs font-semibold uppercase tracking-wider"
                :class="lightMode ? 'text-gray-400' : 'text-gray-600'"
                x-text="group.label"
              ></div>
              <template x-for="c in group.courses" :key="c.id">
                <a
                  :href="'learn.html?course=' + c.id"
                  class="flex items-center gap-2 px-3 py-1.5 text-xs transition-colors no-underline"
                  :class="c.id === courseId
                    ? (lightMode ? 'bg-blue-50 text-blue-700 font-semibold' : 'bg-blue-900/30 text-blue-300 font-semibold')
                    : (lightMode ? 'text-gray-600 hover:bg-gray-100 hover:text-gray-900' : 'text-gray-400 hover:bg-gray-800/60 hover:text-gray-200')"
                >
                  <span
                    class="shrink-0"
                    style="width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:12px"
                    x-html="c.icon && c.icon.startsWith('http')
                      ? '<img src=\'' + c.icon + '\' style=\'width:14px;height:14px;object-fit:contain\'>'
                      : c.icon && c.icon.startsWith('<')
                        ? c.icon
                        : (c.icon || '📄')"
                  ></span>
                  <span class="flex-1 truncate" x-text="c.title"></span>
                  <span
                    class="shrink-0 text-xs"
                    :class="stepProgress(c.id) >= c.step_count && c.step_count > 0
                      ? (lightMode ? 'text-green-600' : 'text-green-400')
                      : (lightMode ? 'text-gray-400' : 'text-gray-600')"
                    x-text="stepProgress(c.id) > 0
                      ? (stepProgress(c.id) >= c.step_count && c.step_count > 0 ? '✓' : stepProgress(c.id) + '/' + c.step_count)
                      : ''"
                  ></span>
                </a>
              </template>
            </div>
          </template>
        </div>

        
        <div
          class="shrink-0 px-3 py-3 border-t w-[220px]"
          :class="lightMode ? 'border-gray-200' : 'border-gray-800'"
        >
          <template x-if="!confirmReset">
            <button
              @click="confirmReset = true"
              class="w-full text-xs py-1.5 px-3 rounded transition-colors text-left"
              :class="lightMode ? 'text-gray-400 hover:text-red-600 hover:bg-red-50' : 'text-gray-600 hover:text-red-400 hover:bg-red-900/20'"
            >↺ Reset all progress</button>
          </template>
          <template x-if="confirmReset">
            <div class="flex items-center gap-2">
              <span class="text-xs flex-1" :class="lightMode ? 'text-gray-500' : 'text-gray-500'">Sure?</span>
              <button
                @click="resetAllProgress()"
                class="text-xs px-2 py-1 rounded bg-red-600 hover:bg-red-500 text-white transition-colors"
              >Reset</button>
              <button
                @click="confirmReset = false"
                class="text-xs px-2 py-1 rounded transition-colors"
                :class="lightMode ? 'text-gray-500 hover:text-gray-700' : 'text-gray-500 hover:text-gray-300'"
              >Cancel</button>
            </div>
          </template>
        </div>
      </div>

      
      <div
        class="flex flex-col border-r shrink-0 transition-colors relative"
        :class="lightMode ? 'bg-white border-gray-200' : 'bg-gray-900 border-gray-800'"
        style="width:42%; min-width:320px;"
      >

        
        <button
          @click="pathOpen = !pathOpen"
          class="absolute z-20 flex items-center justify-center rounded-r transition-colors"
          style="top:50%;transform:translateY(-50%);left:0;width:18px;height:32px;"
          :class="lightMode
            ? 'bg-gray-100 hover:bg-gray-200 text-gray-400 border border-l-0 border-gray-200'
            : 'bg-gray-900 hover:bg-gray-800 text-gray-500 border border-l-0 border-gray-700'"
          :title="pathOpen ? 'Hide pathway' : 'Show pathway'"
        >
          <svg
            class="w-2.5 h-2.5 transition-transform duration-200"
            :class="pathOpen ? '' : 'rotate-180'"
            fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"
          ><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </button>

        
        <div
          class="px-6 pt-5 pb-3 border-b shrink-0 relative"
          :class="lightMode ? 'border-gray-200' : 'border-gray-800'"
        >
          <div
            class="text-xs font-semibold uppercase tracking-widest mb-1"
            :class="lightMode ? 'text-blue-600' : 'text-blue-400'"
            x-text="course ? `Step ${stepIndex + 1} of ${course.steps.length}` : ''"
          ></div>
          <button
            @click="showStepDropdown = !showStepDropdown"
            class="flex items-center gap-2 w-full text-left"
            style="background:none;border:none;padding:0;cursor:pointer;"
          >
            <h1
              class="text-lg font-bold flex-1"
              :class="lightMode ? 'text-gray-900' : 'text-white'"
              x-text="currentStep?.title || ''"
            ></h1>
            <svg
              class="w-4 h-4 shrink-0 transition-transform duration-150"
              :class="[lightMode ? 'text-gray-400' : 'text-gray-500', showStepDropdown ? 'rotate-180' : '']"
              fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
            ><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>

          
          <div
            x-show="showStepDropdown"
            @click.outside="showStepDropdown = false"
            x-transition:enter="transition ease-out duration-100"
            x-transition:enter-start="opacity-0 -translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-75"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-1"
            class="absolute left-0 right-0 z-50 overflow-y-auto border-t"
            :class="lightMode ? 'bg-white border-gray-200 shadow-lg' : 'bg-gray-900 border-gray-700 shadow-xl'"
            style="top:100%; max-height:320px;"
          >
            <template x-for="(step, i) in (course?.steps || [])" :key="i">
              <button
                @click="goToStep(i)"
                class="w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm transition-colors"
                :class="i === stepIndex
                  ? (lightMode ? 'bg-blue-50 text-blue-700' : 'bg-blue-900/30 text-blue-300')
                  : (lightMode ? 'text-gray-700 hover:bg-gray-50' : 'text-gray-300 hover:bg-gray-800')"
              >
                <span
                  class="shrink-0 text-xs font-mono w-5 text-right opacity-40"
                  x-text="i + 1"
                ></span>
                <span class="flex-1" x-text="step.title"></span>
                <span
                  x-show="i < stepIndex"
                  class="text-xs opacity-40"
                  :class="lightMode ? 'text-green-600' : 'text-green-400'"
                >✓</span>
              </button>
            </template>
          </div>
        </div>

        
        <div
          class="flex-1 overflow-y-auto px-6 py-5 prose"
          :class="lightMode ? 'light-prose' : ''"
          x-html="renderedInstruction"
        ></div>

        
        <div class="px-6 pb-3 shrink-0">
          <button
            x-show="currentStep?.hint && !showHint"
            @click="showHint = true"
            class="text-xs underline transition-colors"
            :class="lightMode ? 'text-yellow-600 hover:text-yellow-500' : 'text-yellow-500 hover:text-yellow-400'"
          >Show hint</button>
          <div
            x-show="showHint && currentStep?.hint"
            class="text-xs rounded-lg px-3 py-2"
            :class="lightMode
              ? 'text-yellow-800 bg-yellow-50 border border-yellow-200'
              : 'text-yellow-400 bg-yellow-900/20 border border-yellow-800/40'"
            x-text="currentStep?.hint"
          ></div>
        </div>

        
        <div
          x-show="feedback"
          class="mx-6 mb-3 px-3 py-2 rounded-lg text-sm shrink-0"
          :class="feedbackOk
            ? (lightMode ? 'bg-green-50 border border-green-300 text-green-700' : 'bg-green-900/30 border border-green-700/40 text-green-400')
            : (lightMode ? 'bg-red-50 border border-red-300 text-red-700' : 'bg-red-900/20 border border-red-800/40 text-red-400')"
          x-text="feedback"
        ></div>

        
        <div class="px-6 pb-5 flex gap-3 shrink-0">
          <button
            @click="prevStep()"
            :disabled="stepIndex === 0"
            class="flex-1 py-2.5 rounded-lg border text-sm font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
            :class="lightMode
              ? 'border-gray-300 text-gray-700 hover:border-gray-500'
              : 'border-gray-700 text-gray-300 hover:border-gray-500'"
          >&larr; Back</button>

          <button
            @click="checkAndAdvance()"
            :disabled="!course"
            class="flex-grow py-2.5 px-5 rounded-lg text-sm font-semibold transition-colors"
            :class="stepIndex === (course?.steps.length - 1)
              ? 'bg-green-600 hover:bg-green-500 text-white'
              : 'bg-blue-600 hover:bg-blue-500 text-white'"
            x-text="stepIndex === (course?.steps.length - 1) ? 'Finish' : 'Check & Continue ->'"
          ></button>
        </div>

      </div>

      
      <div class="flex flex-col flex-1 overflow-hidden">

        
        <div class="flex items-center gap-0 border-b border-gray-800 bg-gray-950 px-3 shrink-0" style="height:40px;">
          <template x-for="file in editorFiles" :key="file">
            <button
              @click="switchFile(file)"
              class="px-4 py-1 text-xs font-mono rounded-t transition-colors"
              :class="activeFile === file
                ? 'bg-gray-800 text-white border-b-2 border-blue-500'
                : 'text-gray-500 hover:text-gray-300'"
              x-text="file"
            ></button>
          </template>
        </div>

        
        <div class="flex-1 overflow-hidden bg-gray-950 relative">
          <textarea id="code-editor"></textarea>
        </div>

        
        <div
          x-show="outputVisible"
          class="border-t border-gray-800 bg-gray-950 shrink-0 overflow-y-auto"
          style="height:140px;"
        >
          <div class="flex items-center gap-2 px-4 py-2 border-b border-gray-800">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Terminal</span>
            <button @click="outputVisible = false" class="ml-auto text-gray-600 hover:text-gray-400 text-xs">x</button>
          </div>
          <pre class="px-4 py-2 text-xs text-green-400 font-mono whitespace-pre-wrap" x-text="terminalOutput"></pre>
        </div>

      </div>
    </div>

    
    <div
      x-show="completed"
      class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
      x-transition
    >
      <div class="bg-gray-900 border border-gray-700 rounded-2xl p-10 text-center max-w-md mx-4">
        <div class="text-5xl mb-4">🎉</div>
        <h2 class="text-2xl font-bold text-white mb-2">Course Complete!</h2>
        <p class="text-gray-400 mb-6" x-text="`You finished ${course?.title}.`"></p>
        <div class="flex gap-3 justify-center">
          <a href="index.html" class="px-5 py-2.5 rounded-lg border border-gray-600 text-sm font-medium text-gray-300 hover:border-gray-400 transition-colors">
            &larr; Back to courses
          </a>
          <button @click="restartCourse()" class="px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-sm font-semibold text-white transition-colors">
            Restart
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    let cmEditor = null;

    function learnApp() {
      return {
        course: null,
        stepIndex: 0,
        showHint: false,
        feedback: '',
        feedbackOk: false,
        completed: false,
        outputVisible: false,
        terminalOutput: '',
        activeFile: 'app.py',
        editorFiles: ['app.py'],
        userCode: {},
        showStepDropdown: false,
        lightMode: localStorage.getItem('lightMode') === 'true',
        pathOpen: localStorage.getItem('pathOpen') !== 'false',
        allCourses: [],
        courseId: '',
        confirmReset: false,

        get currentStep() {
          return this.course?.steps[this.stepIndex] ?? null;
        },

        get progress() {
          if (!this.course) return 0;
          return (this.stepIndex / this.course.steps.length) * 100;
        },

        get renderedInstruction() {
          if (!this.currentStep) return '';
          return marked.parse(this.currentStep.instruction || '');
        },

        get courseGroups() {
          const order = [
            'flask','flask-auth','flask-password-reset',
            'fastapi-python','fastapi','fastapi-auth','fastapi-password-reset','fastapi-apikey',
            'fastapi-http','fastapi-databases','fastapi-external',
            'fastapi-ship','fastapi-uploads','fastapi-email',
            'fastapi-search','stripe-payments','fastapi-background','fastapi-ai',
            'fastapi-webhooks','fastapi-oauth','fastapi-scheduled','fastapi-dashboard','fastapi-xrpl',
            'fastapi-forms-api','fastapi-websockets',
            'django','django-auth','django-password-reset',
            'git-basics','fastapi-postgres','fastapi-testing','deploy-vps'
          ];
          const sorted = [...this.allCourses].sort((a, b) => {
            const ai = order.indexOf(a.id), bi = order.indexOf(b.id);
            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
          });
          const sections = [
            { label: 'Flask',   fn: c => c.id === 'flask' || c.id.startsWith('flask-') },
            { label: 'FastAPI', fn: c => c.id === 'fastapi' || c.id.startsWith('fastapi-') || c.id === 'stripe-payments' },
            { label: 'Django',  fn: c => c.id === 'django' || c.id.startsWith('django-') },
            { label: 'Tooling', fn: c => c.category === 'tools' },
          ];
          return sections
            .map(s => ({ label: s.label, courses: sorted.filter(s.fn) }))
            .filter(g => g.courses.length > 0);
        },

        stepProgress(id) {
          const saved = localStorage.getItem('progress_' + id);
          return saved !== null ? parseInt(saved) + 1 : 0;
        },

        resetAllProgress() {
          Object.keys(localStorage)
            .filter(k => k.startsWith('progress_'))
            .forEach(k => localStorage.removeItem(k));
          this.confirmReset = false;
          
          this.userCode = {};
          this.stepIndex = 0;
          localStorage.setItem(`progress_${this.courseId}`, '0');
          this.loadStep();
        },

        toggleLight() {
          this.lightMode = !this.lightMode;
          localStorage.setItem('lightMode', String(this.lightMode));
        },

        async init() {
          const params = new URLSearchParams(location.search);
          this.courseId = params.get('course') || 'flask';
          const res = await fetch(`api/course/${this.courseId}.json`);
          if (!res.ok) { location.href = 'index.html'; return; }
          this.course = await res.json();

          const saved = parseInt(localStorage.getItem(`progress_${this.courseId}`) || '0');
          this.stepIndex = Math.min(saved, this.course.steps.length - 1);

          
          try {
            const allRes = await fetch('api/courses.json');
            this.allCourses = await allRes.json();
          } catch(e) {}

          this.$watch('pathOpen', val => localStorage.setItem('pathOpen', String(val)));
          this.$watch('stepIndex', val => {
            if (this.courseId) localStorage.setItem(`progress_${this.courseId}`, String(val));
          });

          this.$nextTick(() => {
            this.initEditor();
            this.loadStep();
          });
        },

        initEditor() {
          const textarea = document.getElementById('code-editor');
          cmEditor = CodeMirror.fromTextArea(textarea, {
            mode: 'python',
            theme: 'dracula',
            lineNumbers: true,
            indentWithTabs: false,
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: false,
            autofocus: true,
            extraKeys: { Tab: (cm) => cm.execCommand('insertSoftTab') }
          });
          cmEditor.setSize('100%', '100%');
          cmEditor.on('change', () => {
            this.userCode[`${this.stepIndex}_${this.activeFile}`] = cmEditor.getValue();
            this.feedback = '';
          });
        },

        loadStep() {
          const step = this.currentStep;
          if (!step) return;

          this.showHint = false;
          this.feedback = '';
          this.outputVisible = false;

          const files = step.files || [step.file || 'app.py'];
          this.editorFiles = files;
          this.activeFile = files[0];

          const code = this.userCode[`${this.stepIndex}_${this.activeFile}`] ?? step.starter_code ?? '';
          if (cmEditor) {
            cmEditor.setValue(code);
            cmEditor.setOption('mode', this.modeForFile(this.activeFile));
            cmEditor.refresh();
          }

          if (step.terminal_output) {
            this.terminalOutput = step.terminal_output;
            this.outputVisible = true;
          }

          if (this.courseId) {
            localStorage.setItem(`progress_${this.courseId}`, String(this.stepIndex));
          }
        },

        switchFile(file) {
          this.userCode[`${this.stepIndex}_${this.activeFile}`] = cmEditor?.getValue() ?? '';
          this.activeFile = file;
          const step = this.currentStep;
          const code = this.userCode[`${this.stepIndex}_${file}`] ?? step?.starter_code ?? '';
          if (cmEditor) {
            cmEditor.setValue(code);
            cmEditor.setOption('mode', this.modeForFile(file));
            cmEditor.refresh();
          }
        },

        modeForFile(filename) {
          if (filename.endsWith('.html')) return 'htmlmixed';
          if (filename.endsWith('.js')) return 'javascript';
          if (filename.endsWith('.css')) return 'css';
          return 'python';
        },

        checkAndAdvance() {
          const step = this.currentStep;
          if (!step) return;

          this.userCode[`${this.stepIndex}_${this.activeFile}`] = cmEditor?.getValue() ?? '';
          const code = this.userCode[`${this.stepIndex}_${this.activeFile}`];
          const result = this.validate(code, step);

          if (!result.ok) {
            this.feedbackOk = false;
            this.feedback = result.message;
            return;
          }

          this.feedbackOk = true;
          this.feedback = result.message || 'Correct!';

          if (step.terminal_output) {
            this.terminalOutput = step.terminal_output;
            this.outputVisible = true;
          }

          setTimeout(() => {
            if (this.stepIndex >= this.course.steps.length - 1) {
              this.completed = true;
              localStorage.setItem(`progress_${this.course.id}`, String(this.course.steps.length));
            } else {
              this.stepIndex++;
              this.loadStep();
            }
          }, 700);
        },

        validate(code, step) {
          if (!step.validate) return { ok: true, message: 'Moving on...' };
          const rules = Array.isArray(step.validate) ? step.validate : [step.validate];

          for (const rule of rules) {
            const colonIdx = rule.indexOf(':');
            const type = rule.slice(0, colonIdx);
            const value = rule.slice(colonIdx + 1);

            if (type === 'contains') {
              if (!code.includes(value)) {
                return { ok: false, message: `Your code should include: \`${value}\`` };
              }
            } else if (type === 'regex') {
              if (!new RegExp(value, 'm').test(code)) {
                return { ok: false, message: step.error_message || 'Check your code - something looks off.' };
              }
            } else if (type === 'none') {
              return { ok: true, message: 'Moving on...' };
            }
          }
          return { ok: true, message: 'Looks good!' };
        },

        prevStep() {
          if (this.stepIndex > 0) {
            this.stepIndex--;
            this.loadStep();
          }
        },

        goToStep(i) {
          if (cmEditor) {
            this.userCode[`${this.stepIndex}_${this.activeFile}`] = cmEditor.getValue();
          }
          this.stepIndex = i;
          this.showStepDropdown = false;
          this.loadStep();
        },

        restartCourse() {
          this.completed = false;
          this.stepIndex = 0;
          this.userCode = {};
          localStorage.setItem(`progress_${this.course.id}`, '0');
          this.loadStep();
        },
      }
    }
  </script>
